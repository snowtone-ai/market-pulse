<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0e1a">
  <title>Market Pulse — 朝の市場レポート</title>
  <link rel="manifest" href="/market-pulse/manifest.json">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0e1a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #0f1629;
      border-bottom: 1px solid #1e3a5f;
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    header .logo {
      font-size: 1.25rem;
      font-weight: 700;
      color: #60a5fa;
      letter-spacing: -0.02em;
    }
    header .tagline {
      font-size: 0.75rem;
      color: #64748b;
    }
    main {
      flex: 1;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      color: #64748b;
      font-size: 0.875rem;
      margin-bottom: 2rem;
    }
    .report-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .report-card {
      background: #0f1629;
      border: 1px solid #1e3a5f;
      border-radius: 0.5rem;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s;
    }
    .report-card:hover { border-color: #3b82f6; }
    .report-date {
      font-size: 0.9375rem;
      font-weight: 500;
      color: #e2e8f0;
    }
    .report-arrow { color: #3b82f6; font-size: 1.25rem; }
    .empty-state {
      text-align: center;
      padding: 4rem 1rem;
      color: #475569;
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }
    .empty-state p { font-size: 0.9375rem; }
    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.75rem;
      color: #334155;
      border-top: 1px solid #1e2d40;
    }
  </style>
</head>
<body>
  <header>
    <div>
      <div class="logo">Market Pulse</div>
      <div class="tagline">Powered by Gemini 2.5 Flash · 毎朝7時 JST 更新</div>
    </div>
  </header>
  <main>
    <h1>レポートアーカイブ</h1>
    <p class="subtitle">最新レポートは毎朝7時（JST）に自動生成されます</p>
    <div class="report-list" id="report-list">
      <div class="empty-state">
        <div class="icon">📊</div>
        <p>最初のレポートは明朝7時に生成されます</p>
      </div>
    </div>
  </main>
  <footer>Market Pulse © 2026 · GitHub Actions + Gemini 2.5 Flash</footer>
  <script>
    // レポート一覧を動的生成（reports/YYYY-MM-DD.html の存在確認は Actions が index を更新する）
    const list = document.getElementById('report-list');
    window.__REPORTS__ = ["2026-04-22", "2026-04-21"];
    const reports = window.__REPORTS__ || [];
    if (reports.length > 0) {
      list.innerHTML = reports.map(date => `
        <a class="report-card" href="reports/${date}.html">
          <span class="report-date">${date}</span>
          <span class="report-arrow">→</span>
        </a>`).join('');
    }
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/market-pulse/sw.js');
    }
  </script>
</body>
</html>
