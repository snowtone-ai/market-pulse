  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: #f0f2f5;
      color: #111827;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-size: 1.2rem;
      font-weight: 700;
      color: #1d4ed8;
      letter-spacing: -0.02em;
    }
    .tagline {
      font-size: 0.75rem;
      color: #9ca3af;
      margin-top: 0.15rem;
    }
    .header-badge {
      font-size: 0.7rem;
      background: #eff6ff;
      color: #1d4ed8;
      border: 1px solid #bfdbfe;
      border-radius: 4px;
      padding: 0.2rem 0.6rem;
      font-weight: 600;
    }
    main {
      flex: 1;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: 2rem 1.25rem;
    }
    .page-title {
      font-size: 1.375rem;
      font-weight: 700;
      color: #111827;
      margin-bottom: 0.375rem;
    }
    .page-subtitle {
      font-size: 0.875rem;
      color: #6b7280;
      margin-bottom: 1.75rem;
    }
    .report-list {
      display: flex;
      flex-direction: column;
      gap: 0.625rem;
    }
    .report-card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .report-card:hover {
      border-color: #3b82f6;
      box-shadow: 0 1px 6px rgba(59, 130, 246, 0.12);
    }
    .report-card-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .report-date {
      font-size: 0.9375rem;
      font-weight: 600;
      color: #111827;
    }
    .badge-latest {
      font-size: 0.65rem;
      font-weight: 700;
      background: #dcfce7;
      color: #15803d;
      border: 1px solid #bbf7d0;
      border-radius: 3px;
      padding: 0.1rem 0.45rem;
      letter-spacing: 0.04em;
    }
    .report-arrow {
      color: #9ca3af;
      font-size: 1rem;
      transition: color 0.15s;
    }
    .report-card:hover .report-arrow { color: #3b82f6; }
    .empty-state {
      text-align: center;
      padding: 4rem 1rem;
      color: #9ca3af;
      background: #ffffff;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .empty-state p { font-size: 0.9rem; }
    footer {
      text-align: center;
      padding: 1.25rem;
      font-size: 0.75rem;
      color: #9ca3af;
      border-top: 1px solid #e5e7eb;
      background: #ffffff;
    }
  </style>
</head>
